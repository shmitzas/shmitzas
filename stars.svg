<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="Open source impact — total stars received and count of source repositories starred by others.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1621"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0dcaf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#19ee19" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#19ee19" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card surface -->
  <rect width="1200" height="220" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="300" cy="110" r="260" fill="url(#glowCyan)"/>
  <circle cx="900" cy="110" r="260" fill="url(#glowCyan)"/>
  <circle cx="600" cy="110" r="300" fill="url(#glowGreen)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1199" height="219" rx="24" ry="24"
        fill="none" stroke="#0dcaf0" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Top accent bar (animated pulse) -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner dots -->
  <circle cx="40" cy="40" r="3" fill="#0dcaf0" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1160" cy="40" r="3" fill="#0dcaf0" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="180" r="3" fill="#0dcaf0" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1160" cy="180" r="3" fill="#0dcaf0" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Header label top-left with star mark -->
  <g transform="translate(40, 48)" font-family="'Roboto','Segoe UI',Arial,sans-serif">
    <text x="0" y="10" font-size="16" fill="#19ee19">★</text>
    <text x="18" y="10" font-size="12" font-weight="700" fill="#ffffff" opacity="0.55" letter-spacing="3">OPEN SOURCE</text>
  </g>

  <!-- Metric cards. 2 cards × 400 wide, gap 30. Total = 830. Start x = 185. -->
  <g transform="translate(185, 85)" font-family="'Roboto','Segoe UI',Arial,sans-serif">
    <!-- Card 1: total stars -->
    <g>
      <rect x="0" y="0" width="400" height="105" rx="14"
            fill="#0dcaf0" fill-opacity="0.05"
            stroke="#0dcaf0" stroke-opacity="0.22"/>
      <text id="stars-count" x="200" y="60" text-anchor="middle"
            font-size="52" font-weight="900" fill="#ffffff">17</text>
      <text x="200" y="88" text-anchor="middle"
            font-size="12" font-weight="700" fill="#ffffff" opacity="0.55" letter-spacing="3">TOTAL STARS RECEIVED</text>
    </g>

    <!-- Card 2: repos starred -->
    <g transform="translate(430, 0)">
      <rect x="0" y="0" width="400" height="105" rx="14"
            fill="#0dcaf0" fill-opacity="0.05"
            stroke="#0dcaf0" stroke-opacity="0.22"/>
      <text id="repos-count" x="200" y="60" text-anchor="middle"
            font-size="52" font-weight="900" fill="#ffffff">5</text>
      <text x="200" y="88" text-anchor="middle"
            font-size="12" font-weight="700" fill="#ffffff" opacity="0.55" letter-spacing="3">REPOSITORIES STARRED</text>
    </g>
  </g>
</svg>
